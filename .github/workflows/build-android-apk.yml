name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-apk:
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
        include:
          - abi: arm64-v8a
            platform: android-arm64
          - abi: armeabi-v7a
            platform: android-arm
          - abi: x86_64
            platform: android-x64
    
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: |
          yarn set version 4
          yarn install
          yarn cache clean

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild for Android
        run: |
          yarn prebuild -p android
          yarn cache clean

      - name: Make gradlew executable
        run: |
          cd android
          chmod +x ./gradlew

      - name: Create debug keystore (if needed)
        run: |
          cd android/app
          if [ ! -f debug.keystore ]; then
            echo "Debug keystore not found, generating one..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storetype JKS
          else
            echo "Debug keystore already exists, skipping generation."
          fi

      - name: Build APK for specific ABI
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew assembleRelease -PreactNativeArchitectures=${{ matrix.abi }} --parallel --max-workers=2
            APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
            echo "APK_FILE=$APK_FILE" >> $GITHUB_ENV
          else
            ./gradlew assembleDebug -PreactNativeArchitectures=${{ matrix.abi }} --parallel --max-workers=2
            APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
            echo "APK_FILE=$APK_FILE" >> $GITHUB_ENV
          fi
          echo "Build completed for ${{ matrix.abi }}"
          
      - name: Rename APK with ABI info
        run: |
          cd android
          if [ -z "${APK_FILE}" ]; then
            echo "APK file not found"
            ls -R app/build/outputs/apk/
            exit 1
          fi
          mv "${APK_FILE}" "../cherry-studio-${{ matrix.abi }}.apk"
          echo "APK renamed to cherry-studio-${{ matrix.abi }}.apk"
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cherry-studio-${{ matrix.abi }}
          path: cherry-studio-${{ matrix.abi }}.apk
          if-no-files-found: warn

  build-universal-apk:
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks/
          
      - name: List downloaded APKs
        run: ls -R apks/
        
      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: cherry-studio-all-abis
          path: apks/